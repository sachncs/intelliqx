name: ci

on:
  push:
    branches: [master]
  pull_request:

env:
  INTELLIQX_CLOUD: local
  INTELLIQX_LLM_BACKEND: fake
  INTELLIQX_OBJECT_STORE: memory
  INTELLIQX_OTEL: "0"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv==0.9.18
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Black
        run: uv run black --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv==0.9.18
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Ruff
        run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv==0.9.18
      - name: Sync workspace
        run: uv sync --all-packages
      - name: mypy
        run: uv run mypy libs agents

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv==0.9.18
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Vulture
        run: uv run vulture libs agents tests .vulture-whitelist

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, contract]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv==0.9.18
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Run ${{ matrix.suite }} tests
        run: uv run pytest tests/${{ matrix.suite }} -q

  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: |
          docker compose config -q || (
            echo "Install docker compose for validation" &&
            curl -L https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m) -o /usr/local/bin/docker-compose &&
            chmod +x /usr/local/bin/docker-compose &&
            docker-compose config -q
          )