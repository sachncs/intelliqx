services:
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    container_name: aqip-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: aqip-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    container_name: aqip-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: aqip
      MINIO_ROOT_PASSWORD: aqip-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: aqip-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-fake}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-fake}
    volumes:
      - ./infra/local/litellm.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    profiles: ["llm"]

  temporal:
    image: temporalio/auto-setup:1.23
    container_name: aqip-temporal
    environment:
      DB: sqlite
      SQLITE_PRAGMA: journal_mode=WAL
    ports:
      - "7233:7233"
      - "8233:8233"
    profiles: ["workflow"]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aqip-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    profiles: ["observability"]

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: aqip-prometheus
    volumes:
      - ./infra/local/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    profiles: ["observability"]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: aqip-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: aqip
    ports:
      - "3000:3000"
    profiles: ["observability"]