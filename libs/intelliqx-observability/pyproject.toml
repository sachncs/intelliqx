[project]
name = "aqip-observability"
version = "0.1.0"
description = "AQIP observability (OTel + structured logging)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.7",
    "structlog>=24.1",
    "opentelemetry-api>=1.24",
    "opentelemetry-sdk>=1.24",
    "aqip-core",
]

[tool.uv.sources]
aqip-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aqip_observability"]